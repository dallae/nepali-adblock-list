name: Auto-Merge Validated PRs

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]
  workflow_run:
    workflows: ["Validate Adblock List"]
    types: [completed]

permissions:
  contents: write
  pull-requests: write
  checks: read   # needed to read check runs via wait-on-check-action

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    timeout-minutes: 15   # prevent indefinite hangs
    # Filter triggers:
    # - PR events from the repository owner
    # - workflow_run events where validation succeeded
    if: |
      (github.event_name == 'pull_request' && 
       github.event.pull_request.user.login == github.repository_owner) ||
      (github.event_name == 'workflow_run' && 
       github.event.workflow_run.conclusion == 'success')
    concurrency:
      # Use PR number for PR events, otherwise use commit SHA for workflow_run.
      group: auto-merge-${{ github.event_name == 'pull_request' && github.event.pull_request.number || github.event.workflow_run.head_sha }}
      cancel-in-progress: false
    steps:
      # ─────────────────────────────────────────────────────────────────
      # Step 1: Determine the PR number from the event context
      # ─────────────────────────────────────────────────────────────────
      - name: Resolve PR number
        id: pr-resolve
        uses: actions/github-script@v7
        with:
          script: |
            let prNumber = null;
            
            if (context.eventName === 'pull_request') {
              prNumber = context.payload.pull_request.number;
              core.info(`PR event: using PR #${prNumber}`);
            } 
            else if (context.eventName === 'workflow_run') {
              const commitSha = context.payload.workflow_run.head_sha;
              core.info(`workflow_run: searching PRs for commit ${commitSha}`);
              
              const { data: prs } = await github.rest.repos.listPullRequestsAssociatedWithCommit({
                owner: context.repo.owner,
                repo: context.repo.repo,
                commit_sha: commitSha,
                per_page: 10
              });
              
              const candidate = prs.find(pr => 
                pr.state === 'open' && 
                pr.user?.login === context.repo.owner &&
                pr.head.ref?.startsWith('auto-update-')
              );
              
              if (candidate) {
                prNumber = candidate.number;
                core.info(`Found matching PR #${prNumber}`);
              } else {
                core.setFailed(`No open PR found for commit ${commitSha} – skipping merge`);
                return;
              }
            }
            
            if (!prNumber) {
              core.setFailed('Could not resolve PR number from event context');
              return;
            }
            
            core.setOutput('pr_number', prNumber);
            
            // Fetch PR details once and reuse
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber
            });
            core.setOutput('pr_head_sha', pr.head.sha);
            core.setOutput('pr_branch', pr.head.ref);
            core.setOutput('pr_merged', pr.merged);
            
            // Early exit if PR is already merged
            if (pr.merged) {
              core.info(`PR #${prNumber} is already merged – nothing to do`);
              core.setOutput('skip_merge', 'true');
            }

      # ─────────────────────────────────────────────────────────────────
      # Step 2: Wait for validation check to succeed (unless already merged)
      # ─────────────────────────────────────────────────────────────────
      - name: Wait for validation check
        if: steps.pr-resolve.outputs.pr_number && steps.pr-resolve.outputs.skip_merge != 'true'
        uses: lewagon/wait-on-check-action@v1.3.1
        with:
          # ⚠️ COUPLING: This must exactly match the workflow name in validate.yml.
          # Using workflow name is more stable than step name.
          check-name: 'validate'
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ steps.pr-resolve.outputs.pr_head_sha }}
          allowed-conclusions: success,skipped
          wait-interval: 15
          timeout: 600

      # ─────────────────────────────────────────────────────────────────
      # Step 3: Verify PR is mergeable (with longer retry and backoff)
      # ─────────────────────────────────────────────────────────────────
      - name: Check mergeability
        id: merge-check
        if: steps.pr-resolve.outputs.pr_number && steps.pr-resolve.outputs.skip_merge != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = parseInt('${{ steps.pr-resolve.outputs.pr_number }}');
            
            let pr, attempts = 0;
            const maxAttempts = 12;       // 12 attempts with exponential backoff → ~95 seconds max total wait
            let delay = 2000;              // start with 2 seconds
            
            while (attempts < maxAttempts) {
              const { data } = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber
              });
              pr = data;
              
              if (pr.mergeable !== null) {
                core.info(`mergeable=${pr.mergeable}, state=${pr.mergeable_state}`);
                break;
              }
              
              attempts++;
              core.info(`Waiting for mergeable state (attempt ${attempts}/${maxAttempts})...`);
              await new Promise(resolve => setTimeout(resolve, delay));
              delay = Math.min(delay * 1.5, 10000); // exponential backoff, max 10s
            }
            
            if (pr.mergeable !== true) {
              core.setFailed(`PR #${prNumber} not mergeable: state=${pr.mergeable_state}`);
              return;
            }
            
            core.info(`✅ PR #${prNumber} is ready to merge`);
            core.setOutput('ready', 'true');

      # ─────────────────────────────────────────────────────────────────
      # Step 4: Enable GitHub's native auto-merge (preferred)
      # ─────────────────────────────────────────────────────────────────
      - name: Enable native auto-merge
        id: enable
        if: steps.merge-check.outputs.ready == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = parseInt('${{ steps.pr-resolve.outputs.pr_number }}');
            
            // First re-check if PR is still open and not merged
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber
            });
            if (pr.merged) {
              core.info(`PR #${prNumber} was merged before auto-merge could be enabled – skipping`);
              return;
            }
            
            // Helper: API call with retry for rate limits
            async function apiCallWithRetry(fn, maxRetries = 3) {
              for (let i = 0; i < maxRetries; i++) {
                try {
                  return await fn();
                } catch (error) {
                  if (error.status === 403 && error.message?.includes('rate limit')) {
                    const resetTime = error.response?.headers?.['x-ratelimit-reset'];
                    const waitMs = resetTime ? (resetTime * 1000 - Date.now()) : 5000;
                    core.info(`Rate limited, waiting ${waitMs}ms before retry (attempt ${i+1}/${maxRetries})...`);
                    await new Promise(resolve => setTimeout(resolve, waitMs));
                    continue;
                  }
                  throw error;
                }
              }
              throw new Error('Max retries exceeded for API call');
            }
            
            try {
              await apiCallWithRetry(() => 
                github.rest.pulls.enableAutoMerge({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: prNumber,
                  merge_method: 'squash'
                })
              );
              core.info(`✅ Enabled native auto-merge for PR #${prNumber}`);
              return;
            } catch (error) {
              // Only fallback for expected operational errors
              const isOperational = error.status === 405 ||           // Method not allowed
                                   error.status === 409 ||            // Conflict (already merged)
                                   error.message?.includes('auto-merge') ||
                                   error.message?.includes('not enabled');
              
              if (isOperational) {
                core.info(`Using fallback: ${error.message}`);
                core.setOutput('use_fallback', 'true');
              } else {
                // Unexpected error (bug, auth issue, etc.) - fail explicitly
                core.setFailed(`Unexpected error enabling auto-merge: ${error.message} (status: ${error.status})`);
              }
            }

      # ─────────────────────────────────────────────────────────────────
      # Step 5: Fallback manual merge (if native auto-merge fails)
      # ─────────────────────────────────────────────────────────────────
      - name: Fallback manual merge
        if: steps.merge-check.outputs.ready == 'true' && steps.enable.outputs.use_fallback == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = parseInt('${{ steps.pr-resolve.outputs.pr_number }}');
            
            // Helper: API call with retry for rate limits
            async function apiCallWithRetry(fn, maxRetries = 3) {
              for (let i = 0; i < maxRetries; i++) {
                try {
                  return await fn();
                } catch (error) {
                  if (error.status === 403 && error.message?.includes('rate limit')) {
                    const resetTime = error.response?.headers?.['x-ratelimit-reset'];
                    const waitMs = resetTime ? (resetTime * 1000 - Date.now()) : 5000;
                    core.info(`Rate limited, waiting ${waitMs}ms before retry (attempt ${i+1}/${maxRetries})...`);
                    await new Promise(resolve => setTimeout(resolve, waitMs));
                    continue;
                  }
                  throw error;
                }
              }
              throw new Error('Max retries exceeded for API call');
            }
            
            try {
              // Re-fetch PR to ensure it's still mergeable
              const { data: pr } = await apiCallWithRetry(() =>
                github.rest.pulls.get({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: prNumber
                })
              );
              
              if (pr.merged) {
                core.info(`PR #${prNumber} already merged – skipping fallback`);
                return;
              }
              
              if (pr.mergeable !== true) {
                core.setFailed(`PR #${prNumber} is no longer mergeable (state=${pr.mergeable_state})`);
                return;
              }
              
              await apiCallWithRetry(() =>
                github.rest.pulls.merge({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: prNumber,
                  merge_method: 'squash',
                  commit_title: `🔄 Auto-merge: ${pr.title}`,
                  commit_message: `Automatically merged after validation passed\n\nCommit: ${pr.head.sha}`
                })
              );
              
              core.info(`✅ Successfully merged PR #${prNumber} via fallback`);
            } catch (error) {
              if (error.message?.includes('already merged') || error.status === 405) {
                core.info('PR was merged concurrently – no action needed');
              } else {
                core.setFailed(`Fallback merge failed: ${error.message}`);
              }
            }

      # ─────────────────────────────────────────────────────────────────
      # Step 6: Notification (console + optional webhook)
      # ─────────────────────────────────────────────────────────────────
      - name: Notify on merge completion
        if: success() && steps.pr-resolve.outputs.pr_number && steps.pr-resolve.outputs.skip_merge != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = '${{ steps.pr-resolve.outputs.pr_number }}';
            core.info(`🎉 PR #${prNumber} successfully processed`);
            
            // Optional: send to webhook if secret is configured
            const webhookUrl = process.env.NOTIFY_WEBHOOK;
            if (webhookUrl) {
              try {
                await fetch(webhookUrl, {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({
                    text: `✅ PR #${prNumber} auto-merged successfully`,
                    icon_emoji: ':robot_face:',
                    username: 'Auto-Merge Bot'
                  })
                });
                core.info(`Notification sent to webhook`);
              } catch (err) {
                core.warning(`Failed to send webhook notification: ${err.message}`);
              }
            }

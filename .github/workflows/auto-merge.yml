name: Auto-Merge Validated PRs

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]
  workflow_run:
    workflows: ["Validate Adblock List"]
    types: [completed]

permissions:
  contents: write
  pull-requests: write
  checks: read

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: |
      (github.event_name == 'pull_request' && 
       github.event.pull_request.user.login == github.repository_owner) ||
      (github.event_name == 'workflow_run' && 
       github.event.workflow_run.conclusion == 'success')
    concurrency:
      group: auto-merge-${{ github.event_name == 'pull_request' && github.event.pull_request.number || github.event.workflow_run.head_sha }}
      cancel-in-progress: false
    steps:
      - name: Resolve PR number
        id: pr-resolve
        uses: actions/github-script@v7
        with:
          script: |
            let prNumber = null;
            
            if (context.eventName === 'pull_request') {
              prNumber = context.payload.pull_request.number;
              core.info(`PR event: using PR #${prNumber}`);
            } 
            else if (context.eventName === 'workflow_run') {
              const commitSha = context.payload.workflow_run.head_sha;
              core.info(`workflow_run: searching PRs for commit ${commitSha}`);
              
              const { data: prs } = await github.rest.repos.listPullRequestsAssociatedWithCommit({
                owner: context.repo.owner,
                repo: context.repo.repo,
                commit_sha: commitSha,
                per_page: 10
              });
              
              const candidate = prs.find(pr => 
                pr.state === 'open' && 
                pr.user?.login === context.repo.owner &&
                pr.head.ref?.startsWith('auto-update-')
              );
              
              if (candidate) {
                prNumber = candidate.number;
                core.info(`Found matching PR #${prNumber}`);
              } else {
                core.setFailed(`No open PR found for commit ${commitSha} – skipping merge`);
                return;
              }
            }
            
            if (!prNumber) {
              core.setFailed('Could not resolve PR number from event context');
              return;
            }
            
            core.setOutput('pr_number', prNumber);
            
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber
            });
            core.setOutput('pr_head_sha', pr.head.sha);
            core.setOutput('pr_branch', pr.head.ref);
            core.setOutput('pr_merged', pr.merged);
            
            if (pr.merged) {
              core.info(`PR #${prNumber} is already merged – nothing to do`);
              core.setOutput('skip_merge', 'true');
            }

      - name: Wait for validation check
        if: steps.pr-resolve.outputs.pr_number && steps.pr-resolve.outputs.skip_merge != 'true'
        uses: lewagon/wait-on-check-action@v1.3.1
        with:
          check-name: 'validate'   # must match the job name in validate.yml
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ steps.pr-resolve.outputs.pr_head_sha }}
          allowed-conclusions: success,skipped
          wait-interval: 15
          timeout: 600

      - name: Check mergeability
        id: merge-check
        if: steps.pr-resolve.outputs.pr_number && steps.pr-resolve.outputs.skip_merge != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = parseInt('${{ steps.pr-resolve.outputs.pr_number }}');
            
            let pr, attempts = 0;
            const maxAttempts = 12;
            let delay = 2000;
            
            while (attempts < maxAttempts) {
              const { data } = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber
              });
              pr = data;
              
              if (pr.mergeable !== null) {
                core.info(`mergeable=${pr.mergeable}, state=${pr.mergeable_state}`);
                break;
              }
              
              attempts++;
              core.info(`Waiting for mergeable state (attempt ${attempts}/${maxAttempts})...`);
              await new Promise(resolve => setTimeout(resolve, delay));
              delay = Math.min(delay * 1.5, 10000);
            }
            
            if (pr.mergeable !== true) {
              core.setFailed(`PR #${prNumber} not mergeable: state=${pr.mergeable_state}`);
              return;
            }
            
            core.info(`✅ PR #${prNumber} is ready to merge`);
            core.setOutput('ready', 'true');

      - name: Enable auto-merge via GitHub CLI
        if: steps.merge-check.outputs.ready == 'true'
        run: |
          gh pr merge ${{ steps.pr-resolve.outputs.pr_number }} \
            --auto \
            --rebase \
            --repo "${{ github.repository }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify on merge completion
        if: success() && steps.pr-resolve.outputs.pr_number && steps.pr-resolve.outputs.skip_merge != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = '${{ steps.pr-resolve.outputs.pr_number }}';
            core.info(`🎉 PR #${prNumber} successfully processed`);
            
            const webhookUrl = process.env.NOTIFY_WEBHOOK;
            if (webhookUrl) {
              try {
                await fetch(webhookUrl, {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({
                    text: `✅ PR #${prNumber} auto-merge enabled`,
                    icon_emoji: ':robot_face:',
                    username: 'Auto-Merge Bot'
                  })
                });
                core.info(`Notification sent to webhook`);
              } catch (err) {
                core.warning(`Failed to send webhook notification: ${err.message}`);
              }
            }

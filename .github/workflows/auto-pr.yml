name: Auto-Create PR

on:
  push:
    branches: [main]

permissions:
  contents: write       # needed to create branch and push
  pull-requests: write  # needed to create PR

jobs:
  auto-pr:
    runs-on: ubuntu-latest
    # Only run when the repository owner pushes to main (safe, as only owner can write)
    if: github.actor == github.repository_owner
    concurrency:
      group: auto-pr-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1             # only need the latest commit
          token: ${{ secrets.GITHUB_TOKEN }}

      # Check for an existing open auto‑update PR to avoid creating duplicates
      - name: Check for existing auto-update PR
        id: existing
        uses: actions/github-script@v7
        with:
          script: |
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 10,
              sort: 'updated',
              direction: 'desc'
            });
            const existing = prs.find(pr => 
              pr.user?.login === context.repo.owner && 
              pr.head.ref?.startsWith('auto-update-')
            );
            if (existing) {
              core.info(`Found existing PR #${existing.number} with branch ${existing.head.ref}`);
              core.setOutput('branch', existing.head.ref);
              core.setOutput('pr_number', existing.number);
            } else {
              core.info('No existing auto-update PR found – will create new one');
              core.setOutput('branch', '');
              core.setOutput('pr_number', '');
            }

      # Generate branch name only when no existing PR is present
      - name: Generate new branch name (if needed)
        id: new-branch
        if: steps.existing.outputs.branch == ''
        run: |
          # Use the short commit SHA – it is globally unique per commit
          SHORT_SHA=${GITHUB_SHA:0:7}
          echo "branch=auto-update-${SHORT_SHA}" >> $GITHUB_OUTPUT

      - name: Create or update Pull Request
        id: create-pr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # Use existing branch if available, otherwise use the newly generated one
          branch: ${{ steps.existing.outputs.branch || steps.new-branch.outputs.branch }}
          base: main
          title: "🔄 Auto-update: ${{ github.sha }}"
          body: |
            ## Automated Update
            
            | Metadata | Value |
            |----------|-------|
            | Triggered by | ${{ github.actor }} |
            | Commit SHA | ${{ github.sha }} |
            | Timestamp | $(date -u +"%Y-%m-%d %H:%M:%S UTC") |
            
            > ⚠️ This PR will auto-merge if the **Validate Adblock List** workflow passes.
            
            ---
            *Generated by GitHub Actions*
          labels: |
            automated
            adblock-list
          delete-branch: true
          commit-message: "chore: auto-update adblock list [skip ci]"
        continue-on-error: true   # allow manual error handling

      - name: Report PR creation result
        if: steps.create-pr.outcome == 'failure'
        run: |
          echo "::error::Failed to create or update PR. Possible causes:"
          echo "::error::- Permission issues (check GITHUB_TOKEN permissions)"
          echo "::error::- Rate limiting (exceeded GitHub API limits)"
          echo "::error::- Branch name conflict (though this should be handled)"
          echo "::error::- Unexpected API error (see action logs for details)"
          exit 1
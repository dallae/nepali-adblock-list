name: Validate Adblock List

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    concurrency:
      group: validate-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate Adblock Syntax & Rules
        id: validation
        run: |
          FILE="ads-no-more.txt"
          
          if [[ ! -s "$FILE" ]]; then
            echo "❌ File $FILE is missing or empty"
            exit 1
          fi

          echo "🔍 Running validation checks..."

          # ----- 1. File encoding check (BOM) -----
          echo "✓ Checking file encoding..."
          if head -c 3 "$FILE" | od -An -tx1 | grep -q 'ef bb bf'; then
            echo "❌ UTF-8 BOM detected. Please save without BOM."
            exit 1
          fi

          # ----- 2. Syntax validation -----
          echo "✓ Checking syntax..."
          INVALID=$(grep -nvE '^(\[Adblock.*\]|!|@@|\|\|.*(\$.*)?|.*#(@?#)?#.*|.*##\+js\(.*\)|^[[:space:]]*$)' "$FILE" || true)
          if [[ -n "$INVALID" ]]; then
            echo "❌ Invalid syntax detected on lines:"
            echo "$INVALID" | head -20
            echo "::warning::Syntax validation failed. Review lines above."
            exit 1
          fi

          # ----- 3. Comment format check -----
          echo "✓ Checking comment format..."
          BAD_COMMENTS=$(grep -nE '^!\s*(www\.|https?://)' "$FILE" || true)
          if [[ -n "$BAD_COMMENTS" ]]; then
            echo "❌ Comments should not start with '! www' or '! http' - use proper rule syntax:"
            echo "$BAD_COMMENTS" | head -10
            exit 1
          fi

          # ----- 4. Duplicate detection (revised) -----
          echo "✓ Checking for duplicates..."
          
          # Create a temporary file for normalized rules (trimmed, lowercased)
          normalized_file="${{ runner.temp }}/normalized_rules.txt"
          > "$normalized_file"
          
          # Extract non‑comment, non‑header, non‑empty lines
          grep -E '^[^!\[[:space:]]' "$FILE" | while IFS= read -r rule; do
            # Trim leading/trailing whitespace and convert to lowercase
            rule_trimmed=$(echo "$rule" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
            rule_lower=$(echo "$rule_trimmed" | tr '[:upper:]' '[:lower:]')
            echo "$rule_lower" >> "$normalized_file"
          done
          
          # Find duplicate rules (those appearing more than once)
          duplicate_rules=$(sort "$normalized_file" | uniq -c | awk '$1 > 1 {print substr($0, index($0,$2))}')
          
          if [[ -n "$duplicate_rules" ]]; then
            echo "❌ Case-insensitive duplicate rules found:"
            # For each duplicate rule, find all line numbers in the original file
            echo "$duplicate_rules" | while IFS= read -r dup_rule; do
              # Escape the rule for grep (though it's already normalized, we need the original case for matching)
              # We'll search for the original rule by using the lowercased version, but we must match exactly.
              # Use `grep -n -i -F` to find line numbers of the exact original rule (case‑insensitive).
              # However, the original file may have different case, so -i is needed.
              # To avoid false positives, we also need to ensure we match the whole rule (not substring).
              # Since we have the full rule as it appears in the file, we can just use -F.
              # But we need to get the original rule text from the file; we can search for the lowercased version.
              # Simpler: use `grep -n -i -F -x "$dup_rule"` to match whole lines exactly.
              lines=$(grep -n -i -F -x "$dup_rule" "$FILE" | cut -d: -f1 | tr '\n' ',' | sed 's/,$//')
              echo "  Line(s) $lines: $dup_rule"
            done
            exit 1
          fi

          # ----- 5. CRLF line endings -----
          echo "✓ Checking line endings..."
          if grep -q $'\r' "$FILE"; then
            echo "❌ CRLF line endings detected - convert to LF"
            echo "💡 Run: sed -i 's/\r$//' $FILE"
            exit 1
          fi

          # ----- 6. Trailing whitespace -----
          echo "✓ Checking trailing whitespace..."
          TRAILING=$(grep -n '[[:space:]]$' "$FILE" || true)
          if [[ -n "$TRAILING" ]]; then
            echo "❌ Trailing whitespace found on lines:"
            echo "$TRAILING" | head -20
            exit 1
          fi

          # ----- 7. Final newline -----
          echo "✓ Checking final newline..."
          if [[ -s "$FILE" ]]; then
            LAST_CHAR=$(tail -c 1 "$FILE" | od -An -tx1 | tr -d ' \n')
            if [[ "$LAST_CHAR" != "0a" ]]; then
              echo "❌ File must end with at least one newline character"
              exit 1
            fi
          fi

          # ----- 8. Optional: Check for excessively long lines (warning only) -----
          echo "✓ Checking line length (warning only)..."
          LONG_LINES=$(awk 'length > 8192 { print NR": "length" chars" }' "$FILE")
          if [[ -n "$LONG_LINES" ]]; then
            echo "⚠️ Warning: Lines exceeding 8KB may cause parser issues:"
            echo "$LONG_LINES" | head -5
          fi

          # ----- 9. Summary -----
          RULE_COUNT=$(grep -cvE '^(!|\[|[[:space:]]*$)' "$FILE" 2>/dev/null) || RULE_COUNT=0
          echo "✅ Validation passed! Found $RULE_COUNT active rules."
          echo "rule_count=$RULE_COUNT" >> $GITHUB_OUTPUT

      - name: Upload validation log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-details
          path: ${{ runner.temp }}/duplicates.txt
          retention-days: 3
          if-no-files-found: ignore

name: Validate Adblock List

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    concurrency:
      group: validate-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate Adblock Syntax & Rules
        id: validation
        run: |
          FILE="ads-no-more.txt"
          
          if [[ ! -s "$FILE" ]]; then
            echo "âťŚ File $FILE is missing or empty"
            exit 1
          fi

          echo "đź”Ť Running validation checks..."

          # ----- 1. File encoding check (BOM) -----
          echo "âś“ Checking file encoding..."
          if head -c 3 "$FILE" | od -An -tx1 | grep -q 'ef bb bf'; then
            echo "âťŚ UTF-8 BOM detected. Please save without BOM."
            exit 1
          fi

          # ----- 2. Syntax validation -----
          echo "âś“ Checking syntax..."
          INVALID=$(grep -nvE '^(\[Adblock.*\]|!|@@|\|\|.*(\$.*)?|.*##.*|.*##\+js\(.*\)|^[[:space:]]*$)' "$FILE" || true)
          if [[ -n "$INVALID" ]]; then
            echo "âťŚ Invalid syntax detected on lines:"
            echo "$INVALID" | head -20
            echo "::warning::Syntax validation failed. Review lines above."
            exit 1
          fi

          # ----- 3. Comment format check -----
          echo "âś“ Checking comment format..."
          BAD_COMMENTS=$(grep -nE '^!\s*(www\.|https?://)' "$FILE" || true)
          if [[ -n "$BAD_COMMENTS" ]]; then
            echo "âťŚ Comments should not start with '! www' or '! http' - use proper rule syntax:"
            echo "$BAD_COMMENTS" | head -10
            exit 1
          fi

          # ----- 4. Duplicate detection (fixed) -----
          echo "âś“ Checking for duplicates..."
          # Create a temporary file to store normalized rule -> line numbers
          tmp_map="${{ runner.temp }}/duplicate_map.txt"
          > "$tmp_map"

          # Extract lines that are not comments, headers, or empty
          grep -nE '^[^!\[[:space:]]' "$FILE" | while IFS=: read -r num rule; do
            # Trim leading/trailing whitespace from the rule
            rule_trimmed=$(echo "$rule" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
            # Normalise case (lowercase) for case-insensitive detection
            rule_key=$(echo "$rule_trimmed" | tr '[:upper:]' '[:lower:]')
            echo "$rule_key:$num" >> "$tmp_map"
          done

          # Group by normalized rule and output duplicates with all line numbers
          sort "$tmp_map" | awk -F: '
          {
            if ($1 != prev) {
              if (count > 1) {
                printf "  Line(s) %s: %s\n", lines, prev
              }
              prev = $1
              count = 1
              lines = $2
            } else {
              count++
              lines = lines "," $2
            }
          }
          END {
            if (count > 1) {
              printf "  Line(s) %s: %s\n", lines, prev
            }
          }' > "${{ runner.temp }}/duplicates.txt"

          if [[ -s "${{ runner.temp }}/duplicates.txt" ]]; then
            echo "âťŚ Case-insensitive duplicate rules found (see above)"
            exit 1
          fi

          # ----- 5. CRLF line endings -----
          echo "âś“ Checking line endings..."
          if grep -q $'\r' "$FILE"; then
            echo "âťŚ CRLF line endings detected - convert to LF"
            echo "đź’ˇ Run: sed -i 's/\r$//' $FILE"
            exit 1
          fi

          # ----- 6. Trailing whitespace -----
          echo "âś“ Checking trailing whitespace..."
          TRAILING=$(grep -n '[[:space:]]$' "$FILE" || true)
          if [[ -n "$TRAILING" ]]; then
            echo "âťŚ Trailing whitespace found on lines:"
            echo "$TRAILING" | head -20
            exit 1
          fi

          # ----- 7. Final newline -----
          echo "âś“ Checking final newline..."
          if [[ -s "$FILE" ]]; then
            LAST_CHAR=$(tail -c 1 "$FILE" | od -An -tx1 | tr -d ' \n')
            if [[ "$LAST_CHAR" != "0a" ]]; then
              echo "âťŚ File must end with at least one newline character"
              exit 1
            fi
          fi

          # ----- 8. Optional: Check for excessively long lines (warning only) -----
          echo "âś“ Checking line length (warning only)..."
          LONG_LINES=$(awk 'length > 8192 { print NR": "length" chars" }' "$FILE")
          if [[ -n "$LONG_LINES" ]]; then
            echo "âš ď¸Ź Warning: Lines exceeding 8KB may cause parser issues:"
            echo "$LONG_LINES" | head -5
          fi

          # ----- 9. Summary -----
          RULE_COUNT=$(grep -cvE '^(!|\[|[[:space:]]*$)' "$FILE" 2>/dev/null) || RULE_COUNT=0
          echo "âś… Validation passed! Found $RULE_COUNT active rules."
          echo "rule_count=$RULE_COUNT" >> $GITHUB_OUTPUT

      - name: Upload validation log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-details
          path: ${{ runner.temp }}/duplicates.txt
          retention-days: 3
          if-no-files-found: ignore